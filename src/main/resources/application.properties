# ==========================================
# SNEH Foundation - Salary Slip Management
# ==========================================

spring.application.name=salary-slip-management

server.port=${PORT:8080}

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Error handling ----
# Needed so error.html can show a real message instead of "No message available"
server.error.include-message=always
server.error.include-stacktrace=never

# ---- Logging ----
logging.level.root=INFO
logging.level.com.snehfoundation.salaryslip=DEBUG

# ---- No datasource: explicitly excluded in main class, kept here for clarity ----