# ==========================================
# SNEH Foundation - Salary Slip Management
# ==========================================

spring.application.name=salary-slip-management

server.port=${PORT:8080}

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Session ----
# Each user's uploaded employee list lives only in their own HttpSession
# (see EmployeeSessionHelper) -- there is no shared/application-level storage.
# When a session times out, the servlet container discards it and everything
# in it automatically -- no separate cleanup code is needed for that.
server.servlet.session.timeout=10m

# ---- Error handling ----
# Needed so error.html can show a real message instead of "No message available"
server.error.include-message=always
server.error.include-stacktrace=never

# ---- Logging ----
logging.level.root=INFO
logging.level.com.snehfoundation.salaryslip=DEBUG

# ---- No database, no shared storage ----
# No JDBC/DataSource starter is on the classpath. All employee data lives
# only in each user's HttpSession (see EmployeeSessionHelper) -- never in
# any shared/singleton bean.