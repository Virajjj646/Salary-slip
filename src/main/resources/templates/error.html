<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SNEH Foundation &middot; Something went wrong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<header class="app-header">
    <div class="container">
        <div class="d-flex align-items-center py-3">
            <div class="brand-mark me-3">SNEH</div>
            <div>
                <div class="brand-title">SNEH Foundation</div>
                <div class="brand-subtitle">Salary Slip Management</div>
            </div>
        </div>
    </div>
</header>

<main class="container py-5">
    <div class="card mx-auto" style="max-width: 560px;">
        <div class="card-body text-center py-5">
            <i class="bi bi-exclamation-octagon display-4 text-danger"></i>
            <h1 class="h4 mt-3 mb-2">
                <span th:if="${status}" th:text="'Error ' + ${status}">Error</span>
                <span th:unless="${status}">Something went wrong</span>
            </h1>
            <p class="text-muted mb-4">
                <span th:if="${error}" th:text="${error}">An unexpected error occurred.</span>
                <span th:if="${message != null and !#strings.isEmpty(message)}" th:text="${message}"></span>
            </p>
            <a href="/" class="btn btn-brand">
                <i class="bi bi-house-fill me-1"></i>Back to Dashboard
            </a>
        </div>
    </div>
</main>

</body>
</html>
